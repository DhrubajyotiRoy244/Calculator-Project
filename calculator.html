<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator-Project</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="clearDisplay()">AC</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('00')">00</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                let expression = display.value;

                expression = expression.replace(
                    /(\d+(\.\d+)?)\s*%\s*(\d+(\.\d+)?)/g,
                    (_, a, __, b) => '(${a}/100)*${b}'
                );

                expression = expression.replace(/(\d+(\.\d+)?)%/g, "($1/100)");

                display.value = eval(expression);
            } catch {
                display.value = "Error";
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f0592b, #296fe7);
        }

        .calculator {
            background: rgba(255, 255, 255, 0.021);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.74);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            border: none;
            outline: none;
            border-radius: 10px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 24px;
            text-align: right;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
            box-shadow:
                inset 0 0 10px #c7c7c7,
                inset 0 0 20px #b1b1b1,
                inset 0 0 30px #b9b9b8,
                0 0 10px #ffffff;
        }

        button:active {
            transform: scale(0.8);
        }

        .equal {
            background: linear-gradient(0deg, #fa8220, #f19730);
        }

        .equal:hover {
            transform: scale(0.9);
            background: #f16d30;
            box-shadow:
                inset 0 0 10px #fff,
                inset 0 0 20px #ffd5a4,
                inset 0 0 30px #ffc078,
                0 0 10px #f8aa50;
        }
    </style>
</body>

</html>
